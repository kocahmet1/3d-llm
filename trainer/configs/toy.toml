seed = 1337

[data]
source = "synthetic"
synthetic_train_tokens = 8192
synthetic_val_tokens = 2048

[model]
vocab_size = 16
context_length = 6
d_model = 8
n_heads = 2
n_layers = 2
mlp_ratio = 4
dropout = 0.0
bias = true
tie_embeddings = false

[training]
output_dir = "../runs/toy"
device = "auto"
precision = "fp32"
micro_batch_size = 2
gradient_accumulation_steps = 1
max_steps = 20
learning_rate = 0.001
min_learning_rate = 0.0001
warmup_steps = 2
weight_decay = 0.01
beta1 = 0.9
beta2 = 0.999
grad_clip = 1.0
eval_interval = 5
eval_batches = 4
checkpoint_interval = 10
log_interval = 1
deterministic = true
